<script>
const ATUAL=215,CUMABR=190,META=2870,PJ=460,PA=520,PJAS=1680;
const MO=['Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set'];
const v25=[105,156,244,311,338,529];
const c25al=[null,null,105,261,505,816,1154,1683];

const C25='rgba(224,80,80,0.45)';
const C25line='#e05050';
const rC=[0.619,0.603,0.533,0.370,0.420,0.382];
const rK=[0.257,0.205,0.201,0.363,0.154,0.163];
const rN=[0.124,0.192,0.266,0.267,0.426,0.456];
const B='#185FA5',G='#3B6D11',AM='#BA7517',GR='#27ae60';

let mai=400,jun=550;
function calc(m,j){const fj=CUMABR+m+j,need=META-fj,jul=Math.round(need*PJ/PJAS),ago=Math.round(need*PA/PJAS);return{fj,need,jul,ago,set:need-jul-ago}}
function cum(m,j){const c=calc(m,j);return[null,null,CUMABR,CUMABR+m,CUMABR+m+j,CUMABR+m+j+c.jul,CUMABR+m+j+c.jul+c.ago,META]}
function prj(m,j){const c=calc(m,j);return[null,null,null,m,j,c.jul,c.ago,c.set]}

const SLS=[{id:'s1',nav:'1 · Diagnóstico'},{id:'s0',nav:'2 · Velocidade'},{id:'s2',nav:'3 · Prova 2025'},{id:'sc',nav:'4 · Canais 2025'},{id:'s3',nav:'5 · Proposta'},{id:'s5',nav:'6 · Campanha grupo'}];
const navEl=document.getElementById('nav'),slEl=document.getElementById('slides');
SLS.forEach((s,i)=>{
  const b=document.createElement('button');b.className='nb';b.textContent=s.nav;b.onclick=()=>go(i);navEl.appendChild(b);
  const d=document.createElement('div');d.className='sl';d.id=s.id;slEl.appendChild(d);
});
function go(i){
  document.querySelectorAll('.sl').forEach((s,j)=>s.classList.toggle('on',j===i));
  document.querySelectorAll('.nb').forEach((b,j)=>b.classList.toggle('on',j===i));
}
function K(v,l,c=''){return`<div class="kc"><div class="kv ${c}">${v}</div><div class="kl">${l}</div></div>`}
const baseOpts=(y2=true)=>({responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:11}}}},scales:y2?{y:{beginAtZero:true,title:{display:true,text:'Mensal',font:{size:10}}},y2:{position:'right',grid:{drawOnChartArea:false},title:{display:true,text:'Acumulado',font:{size:10}}}}:{y:{beginAtZero:true,title:{display:true,text:'Ingressos',font:{size:10}}}}});

    <div class="kr">${K(ATUAL,'Ingressos pagos (até 13/mai)')+K(META-ATUAL,'Gap para meta','w')+K((ATUAL/META*100).toFixed(1)+'%','Execução vs meta','w')+K('2.870','Meta 2026')}</div>

    <div class="note" style="margin-top:8px">Eficiência de mídia 2025: canais pagos = 88% das sessões, 18% da receita (CVR 0,03%). Canais orgânicos/owned = 6% das sessões, 54% da receita (CVR 3,83%). Gap de 116x.</div>`;
  new Chart(document.getElementById('c1'),{type:'bar',data:{labels:MO,datasets:[
    {type:'bar',label:'2026 observado (mensal)',data:v26obs,backgroundColor:B+'cc',order:2},
    {type:'bar',label:'2025 mensal (ref)',data:[null,null,...v25],backgroundColor:[null,null,...v25].map((v,i)=>i<2||!v?'transparent':C25),order:3},
    {type:'line',label:'2026 acumulado',data:cum26obs,borderColor:B,borderWidth:2,pointRadius:4,fill:false,yAxisID:'y2',order:0,tension:0.3},
    {type:'line',label:'2025 acumulado',data:c25al,borderColor:C25line,borderWidth:2,pointRadius:3,fill:false,yAxisID:'y2',order:1,tension:0.3},
    {type:'line',label:'Plano original',data:plan,borderColor:AM,borderDash:[6,3],borderWidth:1.5,pointRadius:2,fill:false,yAxisID:'y2',order:2,tension:0.3},
  ]},options:{...baseOpts()}});
}

function buildS2(){
  document.getElementById('s2').innerHTML=`
    <div class="stitle">Perfil do comprador 2025</div>
    <div class="ssub">Base HubSpot classificada: cliente ativo, conhece a Nuvem, novo / não identificado</div>
    <div class="kr">${K('1.683','Total pagos 2025 (abr–set)')+K('62%','Clientes ativos em abr','g')+K('46%','Novos em set','w')}</div>
    <div class="cb"><canvas id="c2"></canvas></div>
    <div class="note">Em abr/2025 (lançamento), 62% eram clientes ativos. Em set/2025 (pico de vendas), 46% eram novos — a máquina externa ganha tração conforme o evento se aproxima e o awareness cresce.</div>`;
  new Chart(document.getElementById('c2'),{type:'bar',data:{labels:MO.slice(2),datasets:[
    {label:'Cliente ativo',data:rC.map((r,i)=>Math.round(r*v25[i])),backgroundColor:B+'cc',stack:'a'},
    {label:'Conhece a Nuvem',data:rK.map((r,i)=>Math.round(r*v25[i])),backgroundColor:AM+'cc',stack:'a'},
    {label:'Novo / Não identificado',data:rN.map((r,i)=>Math.round(r*v25[i])),backgroundColor:'rgba(136,136,136,0.4)',stack:'a'},
    {type:'line',label:'% Novo',data:rN.map(r=>Math.round(r*100)),borderColor:'#888',borderDash:[4,3],pointRadius:3,fill:false,yAxisID:'y2'},
  ]},options:{...baseOpts(),scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true,title:{display:true,text:'Ingressos',font:{size:10}}},y2:{position:'right',grid:{drawOnChartArea:false},ticks:{callback:v=>v+'%'},title:{display:true,text:'% Novo',font:{size:10}},min:0,max:60}}}});
}

function buildSC(){
  const pSess=1441874,oSess=98416,uSess=97607;
  const pRev=115715,oRev=352720,uRev=179371;
  document.getElementById('sc').innerHTML=`
    <div class="stitle">A eficiência estava nas alavancas internas</div>
    <div class="ssub">GA4 · abr–set 2025 · 1,6M sessões · R$648k receita total</div>
    <div class="kr">
      ${K('88%','Sessões — mídia paga','w')}
      ${K('18%','Receita — mídia paga','w')}
      ${K('54%','Receita — orgânico/próprio','g')}

  const donutOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10}}}}};
  new Chart(document.getElementById('cd1'),{type:'doughnut',data:{labels:['Mídia paga','Orgânico/próprio','Sem atribuição'],datasets:[{data:[pSess,oSess,uSess],backgroundColor:['rgba(224,80,80,0.75)',B+'cc','rgba(136,136,136,0.45)'],borderWidth:0}]},options:donutOpts});
  new Chart(document.getElementById('cd2'),{type:'doughnut',data:{labels:['Orgânico/próprio','Sem atribuição','Mídia paga'],datasets:[{data:[oRev,uRev,pRev],backgroundColor:[B+'cc','rgba(136,136,136,0.45)','rgba(224,80,80,0.75)'],borderWidth:0}]},options:donutOpts});
  const chL=['Referral','Org. Social','Email','Unassigned','Org. Vídeo','Org. Search','Display','Paid Other','Paid Social','Paid Search'];
  const chV=[13.99,4.98,1.86,1.84,1.50,0.34,0.50,0.16,0.13,0.04];
  const chC=[B,B,B,'rgba(136,136,136,0.55)',B,B,'rgba(229,148,0,0.75)','rgba(229,148,0,0.75)','rgba(224,80,80,0.7)','rgba(224,80,80,0.7)'];
  new Chart(document.getElementById('cd3'),{type:'bar',data:{labels:chL,datasets:[{data:chV,backgroundColor:chC,borderWidth:0}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{title:{display:true,text:'R$/sessão',font:{size:10}},ticks:{callback:v=>'R$'+v.toFixed(2)}}}}});
}

let c3ref;
function kr3(m,j){const c=calc(m,j);return`<div class="kr">${K(m,'Mai')+K(j,'Jun')+K(c.jul,'Jul','w')+K(c.ago,'Ago','w')+K(c.set,'Set','w')+K(c.need,'Necessário jul–set','w')}</div>`}
function getYoy(m,j){
  const c=calc(m,j);
  const prjD=[null,null,null,m,j,c.jul,c.ago,c.set];
  const yoy=MO.map((_,i)=>{const a=[43,m,j,c.jul,c.ago,c.set][i-2];const b=v25[i-2];return(i>=2&&a&&b)?Math.round((a/b-1)*100):null});
  return{prjD,yoy};
}
function buildS3(){
  document.getElementById('s3').innerHTML=`
    <div class="stitle">Cenário proposto</div>
    <div class="ssub">Mai e Jun definem o restante · Jul–Set distribuídos pela sazonalidade 2025 · linha verde = crescimento YoY</div>
    <div class="sg">
      <label>Mai</label><input type="range" id="sm" min="50" max="800" value="${mai}" step="10"><span class="sv" id="vm">${mai}</span>
      &nbsp;&nbsp;
      <label>Jun</label><input type="range" id="sj" min="50" max="800" value="${jun}" step="10"><span class="sv" id="vj">${jun}</span>
    </div>
    <div id="k3">${kr3(mai,jun)}</div>
    <div class="cb" style="height:265px"><canvas id="c3"></canvas></div>`;
  const d=getYoy(mai,jun);
  c3ref=new Chart(document.getElementById('c3'),{type:'bar',data:{labels:MO,datasets:[
    {label:'2025 real',data:[null,null,...v25],backgroundColor:C25,stack:'a',order:3},
    {label:'2026 observado',data:[57,90,43,25,null,null,null,null],backgroundColor:B,stack:'b',order:4},
    {label:'2026 projetado',data:d.prjD,backgroundColor:B+'66',stack:'b',order:5},
    {type:'line',label:'Crescimento YoY (%)',data:d.yoy,borderColor:G,borderDash:[4,3],borderWidth:1.5,pointRadius:4,pointBackgroundColor:G,fill:false,yAxisID:'y2',order:0,tension:0.3},
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:11}}}},
    scales:{y:{beginAtZero:true,suggestedMax:900,title:{display:true,text:'Ingressos',font:{size:10}},grid:{color:'rgba(0,0,0,.04)'}},
      y2:{position:'right',grid:{drawOnChartArea:false},ticks:{color:G,callback:v=>v+'%'},title:{display:true,text:'Crescimento YoY',font:{size:10},color:G},border:{color:G}},
      x:{grid:{display:false}}}}});
  document.getElementById('sm').oninput=function(){mai=+this.value;document.getElementById('vm').textContent=mai;up3()};
  document.getElementById('sj').oninput=function(){jun=+this.value;document.getElementById('vj').textContent=jun;up3()};
}
function up3(){
  if(!c3ref)return;
  const d=getYoy(mai,jun);
  c3ref.data.datasets[2].data=d.prjD;
  c3ref.data.datasets[3].data=d.yoy;
  c3ref.update();
  document.getElementById('k3').innerHTML=kr3(mai,jun);
}

        <tr><td>Carrinhos recuperados</td><td>5–10 / semana</td></tr>

    </div>`;
  document.getElementById('s5').innerHTML=h;
}
